services:
  boardroom:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - boardroom-data:/data
    environment:
      - DB_PATH=/data/boardroom.db
      - PORT=3000
      # Set to your public URL (e.g. https://boardroom.example.com). Leave empty for relative URLs.
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-}
      - BOARDROOM_API_KEY=${BOARDROOM_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped

volumes:
  boardroom-data:
